<!DOCTYPE html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M Trans Logistik — Qlobal Daşıma Şəbəkəsi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
      body.locked { overflow: hidden; height: 100vh; margin: 0; background-color: #111111; }
      #loader { position: fixed; inset: 0; z-index: 9999; background: #111111; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; transition: transform .9s cubic-bezier(0.25, 0.8, 0.25, 1), opacity .6s ease; }
      #loader.done { transform: translateY(-100%); opacity: 0; pointer-events: none; }
      .ld-brand { text-align: center; font-family: 'Montserrat', sans-serif; color: #fff; }
      .ld-word { font-size: 2.5rem; font-weight: 800; letter-spacing: 4px; display: flex; gap: 2px; }
      .ld-word .ch { color: #fff; }
      .ld-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: #999; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; }
      .ld-route { position: relative; width: 200px; height: 40px; display: flex; align-items: center; }
      .ld-pct { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: #E60000; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; font-weight: 500; }
      .track { width: 100%; height: 2px; background: #333; position: relative; border-radius: 2px; overflow: hidden; }
      .fill { height: 100%; width: 0%; background: #E60000; transition: width 0.15s linear; }
      .ld-truck { position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); color: #fff; width: 24px; height: 24px; transition: left 0.15s linear; }
    </style>
  </head>
  <body class="locked">
    
    <div id="loader">
      <div class="ld-grid"></div>
      <div class="ld-brand">
        <div class="ld-word" id="ldWord">
          <span class="ch">M</span><span class="ch">-</span><span class="ch">T</span><span class="ch">R</span><span class="ch">A</span><span class="ch">N</span><span class="ch">S</span>
        </div>
        <div class="ld-sub">Logistics · Service · Parts</div>
      </div>
      <div class="ld-route">
        <span class="ld-pct" id="ldPct">0%</span>
        <div class="track"><div class="fill" id="ldFill"></div></div>
        <div class="ld-pin"></div>
        <div class="ld-truck" id="ldTruck">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17V7h11v10"/><path d="M14 10h4l3 3v4h-7"/><circle cx="7" cy="18.5" r="1.6"/><circle cx="17.5" cy="18.5" r="1.6"/></svg>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
  </body>
</html>
